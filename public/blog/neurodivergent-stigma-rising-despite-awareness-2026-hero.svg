<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="200" fill="#0d9488" opacity="0.18"/>
  <circle cx="1100" cy="500" r="150" fill="#0d9488" opacity="0.12"/>
  <circle cx="80" cy="500" r="120" fill="#115e59" opacity="0.25"/>
  <circle cx="200" cy="80" r="80" fill="#0f766e" opacity="0.2"/>
  <!-- Headline text -->
  <text x="80" y="200" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="62" fill="#ffffff" letter-spacing="-1">Stigma Is Rising.</text>
  <text x="80" y="280" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="62" fill="#ffffff" letter-spacing="-1">Awareness Isn't Enough.</text>
  <text x="80" y="350" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="30" fill="#ccfbf1" letter-spacing="0">What the 2026 Neurodiversity at Work Survey</text>
  <text x="80" y="392" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="30" fill="#ccfbf1">demands of UK employers</text>
  <!-- Stat pill -->
  <rect x="80" y="430" width="520" height="80" rx="12" fill="#5eead4"/>
  <text x="104" y="466" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="38" fill="#134e4a">70%</text>
  <text x="200" y="458" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#134e4a">of neurodivergent employees fear</text>
  <text x="200" y="484" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#134e4a">disclosing at work — up from 59% in 2024</text>
  <!-- Brand label -->
  <text x="80" y="600" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="16" fill="#5eead4" letter-spacing="3">QUIET SPACE CLUB</text>
</svg>
