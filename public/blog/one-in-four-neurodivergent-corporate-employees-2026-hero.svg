<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="980" cy="100" r="220" fill="white" fill-opacity="0.04" />
  <circle cx="1050" cy="520" r="150" fill="white" fill-opacity="0.03" />
  <circle cx="120" cy="500" r="180" fill="white" fill-opacity="0.03" />
  <circle cx="200" cy="80" r="100" fill="white" fill-opacity="0.04" />

  <!-- Stat pill / card -->
  <rect x="70" y="70" width="310" height="80" rx="40" fill="#5eead4" fill-opacity="0.18" />
  <rect x="70" y="70" width="310" height="80" rx="40" fill="none" stroke="#5eead4" stroke-width="2" stroke-opacity="0.6" />
  <text x="225" y="118" text-anchor="middle" fill="#5eead4" font-size="30" font-weight="700">1 in 4</text>
  <text x="225" y="138" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="400" opacity="0.85">employees are neurodivergent</text>

  <!-- Main headline -->
  <text x="70" y="220" fill="white" font-size="52" font-weight="800" opacity="0.97">The One-in-Four Reality:</text>
  <text x="70" y="285" fill="white" font-size="48" font-weight="700" opacity="0.93">What Corporate Research</text>
  <text x="70" y="345" fill="white" font-size="48" font-weight="700" opacity="0.93">Reveals in 2026</text>

  <!-- Subtext -->
  <text x="70" y="410" fill="#ccfbf1" font-size="22" opacity="0.80">Awareness alone isn\'t enough — the data shows what</text>
  <text x="70" y="438" fill="#ccfbf1" font-size="22" opacity="0.80">UK employers must do differently right now</text>

  <!-- Divider -->
  <rect x="70" y="468" width="80" height="3" rx="2" fill="#5eead4" opacity="0.7" />

  <!-- Key stats row -->
  <text x="70" y="510" fill="#5eead4" font-size="28" font-weight="700">18.5%</text>
  <text x="70" y="533" fill="#a7f3d0" font-size="13">experiencing depression</text>

  <text x="270" y="510" fill="#5eead4" font-size="28" font-weight="700">50% less likely</text>
  <text x="270" y="533" fill="#a7f3d0" font-size="13">to hold management roles</text>

  <text x="560" y="510" fill="#5eead4" font-size="28" font-weight="700">80%+</text>
  <text x="560" y="533" fill="#a7f3d0" font-size="13">say quiet spaces are essential</text>

  <!-- Brand label -->
  <text x="70" y="598" fill="white" font-size="13" font-weight="600" opacity="0.55" letter-spacing="2">QUIET SPACE CLUB</text>
</svg>
