<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neurodiversity Index 2026: Awareness Is Rising But Action Is Lagging">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="180" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="1100" cy="500" r="120" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="100" cy="550" r="200" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="200" cy="100" r="100" fill="#5eead4" fill-opacity="0.06"/>

  <!-- Source label top right -->
  <text x="1160" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#5eead4" fill-opacity="0.8" text-anchor="end">City &amp; Guilds Foundation Neurodiversity Index 2026</text>

  <!-- Main headline -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1">Awareness Is Rising.</text>
  <text x="80" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#5eead4" letter-spacing="-1">Action Is Lagging Behind.</text>

  <!-- Subheadline -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#ccfbf1" font-weight="400">The UK&#x2019;s 2026 neurodiversity delivery gap, by the numbers.</text>

  <!-- Stat pill 1 -->
  <rect x="80" y="370" width="310" height="90" rx="14" fill="#5eead4" fill-opacity="0.18"/>
  <text x="235" y="407" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#5eead4" text-anchor="middle">41%</text>
  <text x="235" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#ccfbf1" text-anchor="middle">impacted most days at work</text>

  <!-- Stat pill 2 -->
  <rect x="420" y="370" width="340" height="90" rx="14" fill="#5eead4" fill-opacity="0.18"/>
  <text x="590" y="407" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#5eead4" text-anchor="middle">3+ months</text>
  <text x="590" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#ccfbf1" text-anchor="middle">average wait for adjustments</text>

  <!-- Stat pill 3 -->
  <rect x="790" y="370" width="310" height="90" rx="14" fill="#5eead4" fill-opacity="0.18"/>
  <text x="945" y="407" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#5eead4" text-anchor="middle">30–35pt</text>
  <text x="945" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#ccfbf1" text-anchor="middle">confidence vs experience gap</text>

  <!-- Divider line -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="#5eead4" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Brand label -->
  <text x="80" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#5eead4" letter-spacing="3">QUIET SPACE CLUB</text>
  <text x="80" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ccfbf1" fill-opacity="0.7">quietspace.club — neuro-friendly workspaces for neurodivergent professionals</text>
</svg>
