<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#5eead4;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="220" fill="white" fill-opacity="0.03" />
  <circle cx="1050" cy="500" r="160" fill="white" fill-opacity="0.04" />
  <circle cx="150" cy="520" r="180" fill="white" fill-opacity="0.03" />
  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="220" rx="3" fill="#5eead4" fill-opacity="0.8" />
  <!-- Tag -->
  <rect x="80" y="140" width="200" height="36" rx="18" fill="#5eead4" fill-opacity="0.2" />
  <text x="180" y="163" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#5eead4" text-anchor="middle" letter-spacing="1">UK WORKPLACE REPORT 2026</text>
  <!-- Main headline -->
  <text x="108" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white">The Confidence Illusion:</text>
  <text x="108" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#ccfbf1">Why Employers Feel Good About</text>
  <text x="108" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#ccfbf1">Neurodiversity — But Employees Don't</text>
  <!-- Subtitle -->
  <text x="108" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#99f6e4" fill-opacity="0.85">City &amp; Guilds Foundation Neurodiversity Index 2026 · Analysis</text>
  <!-- Bottom rule -->
  <rect x="80" y="490" width="560" height="2" rx="1" fill="#5eead4" fill-opacity="0.3" />
  <!-- Logo / brand -->
  <text x="108" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#5eead4" fill-opacity="0.7" letter-spacing="2">QUIET SPACE CLUB</text>
  <text x="108" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" fill-opacity="0.4">quietspace.club</text>
  <!-- Decorative stat pill -->
  <rect x="820" y="260" width="280" height="110" rx="16" fill="white" fill-opacity="0.07" />
  <text x="960" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#5eead4" text-anchor="middle">64%</text>
  <text x="960" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" fill-opacity="0.7" text-anchor="middle">of ND employees lack consistent</text>
  <text x="960" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" fill-opacity="0.7" text-anchor="middle">good support at work</text>
</svg>
