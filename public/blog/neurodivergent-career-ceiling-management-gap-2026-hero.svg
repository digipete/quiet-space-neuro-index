<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#5eead4;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="white" opacity="0.04"/>
  <circle cx="1100" cy="500" r="120" fill="white" opacity="0.03"/>
  <circle cx="100" cy="550" r="200" fill="white" opacity="0.03"/>
  <circle cx="200" cy="80" r="80" fill="#5eead4" opacity="0.06"/>

  <!-- Accent bar -->
  <rect x="80" y="160" width="6" height="240" rx="3" fill="#5eead4"/>

  <!-- Main headline -->
  <text x="110" y="230" font-size="58" font-weight="800" fill="white" letter-spacing="-1">The Neurodivergent</text>
  <text x="110" y="300" font-size="58" font-weight="800" fill="white" letter-spacing="-1">Career Ceiling</text>
  <text x="110" y="370" font-size="32" font-weight="400" fill="#99f6e4" letter-spacing="0">Why 1 in 4 workers is neurodivergent — but not in management</text>

  <!-- Stat pill -->
  <rect x="110" y="410" width="420" height="74" rx="12" fill="#5eead4" opacity="0.18"/>
  <rect x="110" y="410" width="420" height="74" rx="12" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.5"/>
  <text x="320" y="445" font-size="16" fill="#ccfbf1" text-anchor="middle" font-weight="500">NEURODIVERGENT MANAGERS</text>
  <text x="320" y="472" font-size="26" fill="#5eead4" text-anchor="middle" font-weight="800">24–34% vs 39–51% neuromajority</text>

  <!-- Brand label -->
  <text x="80" y="590" font-size="14" fill="#5eead4" font-weight="600" letter-spacing="2" opacity="0.8">QUIET SPACE CLUB</text>
  <text x="80" y="610" font-size="12" fill="white" opacity="0.4" letter-spacing="1">quietspace.club</text>
</svg>
