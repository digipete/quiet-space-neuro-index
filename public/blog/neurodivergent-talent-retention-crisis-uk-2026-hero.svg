<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="1120" cy="520" r="120" fill="#5eead4" fill-opacity="0.06"/>
  <circle cx="80" cy="500" r="220" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="200" cy="80" r="90" fill="#5eead4" fill-opacity="0.05"/>

  <!-- Main headline -->
  <text x="90" y="165" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">1 in 4 Employees Are Neurodivergent.</text>
  <text x="90" y="235" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">Nearly 1 in 4 Are Planning to Leave.</text>

  <!-- Subheadline -->
  <text x="90" y="300" font-size="28" font-weight="400" fill="#99f6e4" letter-spacing="0">The silent neurodivergent talent retention crisis facing UK employers in 2026.</text>

  <!-- Divider line -->
  <rect x="90" y="335" width="120" height="4" rx="2" fill="#5eead4"/>

  <!-- Stat pill / card -->
  <rect x="90" y="365" width="520" height="100" rx="16" fill="#5eead4" fill-opacity="0.15" stroke="#5eead4" stroke-width="1.5"/>
  <text x="120" y="408" font-size="52" font-weight="800" fill="#5eead4">25.7%</text>
  <text x="280" y="398" font-size="18" font-weight="500" fill="#ccfbf1">of neurodivergent employees</text>
  <text x="280" y="422" font-size="18" font-weight="500" fill="#ccfbf1">have already quit due to lack of support</text>
  <text x="120" y="448" font-size="15" fill="#99f6e4" font-style="italic">Source: Alludo Neurodiversity at Work Survey</text>

  <!-- Second stat pill -->
  <rect x="640" y="365" width="460" height="100" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <text x="670" y="408" font-size="52" font-weight="800" fill="#ffffff">23%</text>
  <text x="790" y="398" font-size="18" font-weight="500" fill="#e2e8f0">are currently considering</text>
  <text x="790" y="422" font-size="18" font-weight="500" fill="#e2e8f0">quitting right now</text>
  <text x="670" y="448" font-size="15" fill="#94a3b8" font-style="italic">Source: Alludo Neurodiversity at Work Survey</text>

  <!-- Brand label -->
  <text x="90" y="590" font-size="16" font-weight="600" fill="#5eead4" letter-spacing="3" text-transform="uppercase">QUIET SPACE CLUB</text>
  <text x="90" y="612" font-size="13" fill="#99f6e4" fill-opacity="0.7">quietspace.club — Certified neuro-friendly workspaces</text>
</svg>
