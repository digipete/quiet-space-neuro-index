<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neurodiversity tribunal risk UK 2026 — scales of justice graphic with teal gradient background">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#99f6e4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#99f6e4;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle accent band -->
  <rect width="1200" height="630" fill="url(#accent)" />

  <!-- Decorative circles -->
  <circle cx="980" cy="100" r="260" fill="#ffffff" fill-opacity="0.03" />
  <circle cx="1050" cy="500" r="180" fill="#ffffff" fill-opacity="0.04" />
  <circle cx="120" cy="520" r="200" fill="#ffffff" fill-opacity="0.03" />

  <!-- Scales of justice icon (simplified) -->
  <g transform="translate(900, 200)" opacity="0.15">
    <!-- Beam -->
    <rect x="-140" y="0" width="280" height="8" rx="4" fill="#ffffff" />
    <!-- Post -->
    <rect x="-4" y="0" width="8" height="200" rx="4" fill="#ffffff" />
    <!-- Base -->
    <rect x="-50" y="200" width="100" height="12" rx="6" fill="#ffffff" />
    <!-- Left pan -->
    <line x1="-140" y1="8" x2="-100" y2="60" stroke="#ffffff" stroke-width="4" />
    <line x1="-100" y1="8" x2="-100" y2="60" stroke="#ffffff" stroke-width="4" />
    <ellipse cx="-120" cy="60" rx="40" ry="10" fill="#ffffff" />
    <!-- Right pan (lower - tipped) -->
    <line x1="140" y1="8" x2="100" y2="80" stroke="#ffffff" stroke-width="4" />
    <line x1="100" y1="8" x2="100" y2="80" stroke="#ffffff" stroke-width="4" />
    <ellipse cx="120" cy="80" rx="40" ry="10" fill="#ffffff" />
  </g>

  <!-- Stat callout box -->
  <rect x="72" y="180" width="540" height="100" rx="12" fill="#ffffff" fill-opacity="0.08" />
  <text x="100" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#99f6e4">164%</text>
  <text x="290" y="248" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#ccfbf1">rise in neurodiversity</text>
  <text x="290" y="276" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#ccfbf1">employment tribunals</text>

  <!-- Main title -->
  <text x="72" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">The Growing Tribunal Risk UK Employers</text>
  <text x="72" y="396" font-family="'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Can No Longer Afford to Ignore</text>

  <!-- Subtitle -->
  <text x="72" y="452" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#99f6e4">What the 2026 Data Reveals for HR and Neurodivergent Workers</text>

  <!-- Branding bar -->
  <rect x="0" y="582" width="1200" height="48" fill="#ffffff" fill-opacity="0.06" />
  <text x="72" y="613" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#ccfbf1" letter-spacing="2">QUIETSPACE.CLUB</text>
  <text x="1128" y="613" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#99f6e4" text-anchor="end">2026</text>
</svg>
