<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#99f6e4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#99f6e4;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Subtle decorative accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#99f6e4" opacity="0.6" />
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="url(#accent)" />
  <circle cx="100" cy="520" r="120" fill="#99f6e4" opacity="0.06" />
  <!-- Tag line -->
  <text x="80" y="200" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#99f6e4" letter-spacing="3" opacity="0.9">NEW DATA · MAY 2026</text>
  <!-- Headline -->
  <text x="80" y="272" font-family="'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="700" fill="#ffffff">Only 5% of Neurodivergent Employees</text>
  <text x="80" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="700" fill="#ffffff">Get Workplace Adjustments That Work</text>
  <!-- Subheading -->
  <text x="80" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#ccfbf1" opacity="0.9">The disclosure barrier that keeps 95% of people from the</text>
  <text x="80" y="448" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#ccfbf1" opacity="0.9">support they need — and what UK employers must do now.</text>
  <!-- Brand badge -->
  <rect x="80" y="530" width="220" height="46" rx="23" fill="#ffffff" opacity="0.15" />
  <text x="190" y="559" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">quietspace.club</text>
</svg>
